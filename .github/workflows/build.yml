name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev build-essential \
            liblzma-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            libreadline-dev libjpeg-dev libedit-dev libgdbm-dev \
            g++-multilib libstdc++6-12-dbg libgcc1-dbg \
            openjdk-17-jdk git zip unzip

      - name: Install Buildozer and dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython

      - name: Setup Android SDK requirements
        run: |
          # این مرحله به buildozer کمک می‌کند تا SDK را شناسایی کند
          buildozer android debug || true
          # یک بار اجرا می‌کنیم تا ساختار پوشه‌ها ساخته شود، اگر fail شد نادیده می‌گیریم

      - name: Build APK
        run: |
          # اجرای نهایی build
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-apk
          path: bin/*.apk
